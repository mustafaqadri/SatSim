<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q/V Coexistence Audit Simulator</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #f8fafc;
        }
        #root {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* Custom scrollbar for the sidebar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #e2e8f0;
            border-radius: 10px;
        }
        input[type=range] {
            accent-color: #4f46e5;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Simple Lucide wrapper for the CDN version
        const Icon = ({ name, size = 20, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            // State
            const [satellitePos, setSatellitePos] = useState(45);
            const [isSimulating, setIsSimulating] = useState(true);
            const [showComposite, setShowComposite] = useState(true);
            const [isCompliantMode, setIsCompliantMode] = useState(true);
            const [dishSize, setDishSize] = useState(2.4);
            const [sweepHistory, setSweepHistory] = useState([]);
            const [analysis, setAnalysis] = useState(null);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [isDragging, setIsDragging] = useState(false);
            const [scale, setScale] = useState(1);
            
            const canvasRef = useRef(null);
            const containerRef = useRef(null);

            // Simulation Constants
            const BASE_WIDTH = 1200;
            const BASE_HEIGHT = 800;
            const CANVAS_WIDTH = 800;
            const CANVAS_HEIGHT = 500;
            const GW_Y = 320; 
            const SKY_RADIUS = 240; 
            const URBAN_LEFT_LIMIT = 120;
            const URBAN_RIGHT_LIMIT = 680;
            const MAX_FOOTPRINT_REACH = 250; 
            const PFD_THRESHOLD = -77.6;
            
            const GW_X = isCompliantMode ? 400 : 200;
            const apiKey = ""; 

            // Responsive Scaling Logic
            useEffect(() => {
                const handleResize = () => {
                    const widthScale = window.innerWidth / BASE_WIDTH;
                    const heightScale = window.innerHeight / BASE_HEIGHT;
                    setScale(Math.min(widthScale, heightScale, 1.2)); // Cap at 1.2x for quality
                };
                window.addEventListener('resize', handleResize);
                handleResize();
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Helper for PFD visuals
            const getPFDPercentage = (val) => Math.min(100, Math.max(0, (val + 120) * 1.5));

            // Sim Loop
            useEffect(() => {
                if (!isSimulating || isDragging) return;
                const interval = setInterval(() => {
                    setSatellitePos(prev => {
                        const next = prev + 0.4;
                        if (next > 190) {
                            setSweepHistory([]);
                            return -10;
                        }
                        if (next >= 0 && next <= 180 && Math.floor(next * 10) % 30 === 0) {
                            setSweepHistory(h => {
                                if (!h.find(item => Math.abs(item.angle - next) < 0.5)) {
                                    return [...h, { angle: next }];
                                }
                                return h;
                            });
                        }
                        return next;
                    });
                }, 30);
                return () => clearInterval(interval);
            }, [isSimulating, isDragging]);

            // Interaction
            const handleMouseDown = (e) => {
                if (isSimulating) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left) / scale;
                const mouseY = (e.clientY - rect.top) / scale;
                const rad = (satellitePos * Math.PI) / 180;
                const satX = GW_X + SKY_RADIUS * Math.cos(-rad);
                const satY = GW_Y + SKY_RADIUS * Math.sin(-rad);
                const dist = Math.sqrt(Math.pow(mouseX - satX, 2) + Math.pow(mouseY - satY, 2));
                if (dist < 40) setIsDragging(true);
            };

            const handleMouseMove = (e) => {
                if (!isDragging) return;
                const rect = canvasRef.current.getBoundingClientRect();
                const mouseX = (e.clientX - rect.left) / scale;
                const mouseY = (e.clientY - rect.top) / scale;
                const dx = mouseX - GW_X;
                const dy = mouseY - GW_Y;
                let angleDeg = (Math.atan2(-dy, dx) * 180) / Math.PI;
                setSatellitePos(Math.max(-10, Math.min(190, angleDeg)));
            };

            // PFD & Telemetry
            const elevation = Math.max(0, 90 - Math.abs(satellitePos - 90));
            const basePFD = isCompliantMode ? -105 : -98;
            const pfdVariation = (1 - (elevation / 90)) * (isCompliantMode ? 22 : 35);
            const currentPFD = basePFD + pfdVariation;
            const isThresholdBreach = currentPFD > PFD_THRESHOLD;

            // Render Frame
            useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

                const drawZone = (xStart, xEnd, color, label) => {
                    const grad = ctx.createLinearGradient(0, GW_Y, 0, CANVAS_HEIGHT);
                    grad.addColorStop(0, color); grad.addColorStop(1, '#94a3b8');
                    ctx.fillStyle = grad;
                    ctx.fillRect(xStart, GW_Y, xEnd - xStart, CANVAS_HEIGHT - GW_Y);
                    ctx.fillStyle = 'rgba(15, 23, 42, 0.4)';
                    ctx.font = 'bold 10px sans-serif';
                    ctx.textAlign = 'center';
                    ctx.fillText(label.toUpperCase(), (xStart + xEnd) / 2, CANVAS_HEIGHT - 10);
                };

                drawZone(300, 500, '#f1f5f9', 'Remote Rural Core');
                drawZone(URBAN_LEFT_LIMIT, 300, '#e2e8f0', 'Suburban Buffer');
                drawZone(500, URBAN_RIGHT_LIMIT, '#e2e8f0', 'Suburban Buffer');
                drawZone(0, URBAN_LEFT_LIMIT, '#cbd5e1', 'Urban Restricted');
                drawZone(URBAN_RIGHT_LIMIT, 800, '#cbd5e1', 'Urban Restricted');

                ctx.strokeStyle = 'rgba(71, 85, 105, 0.08)';
                ctx.lineWidth = 1;
                for(let i = -CANVAS_WIDTH; i < CANVAS_WIDTH * 2; i += 60) {
                    ctx.beginPath(); ctx.moveTo(GW_X, GW_Y); ctx.lineTo(i, CANVAS_HEIGHT); ctx.stroke();
                }
                ctx.beginPath(); ctx.moveTo(0, GW_Y); ctx.lineTo(CANVAS_WIDTH, GW_Y);
                ctx.strokeStyle = '#64748b'; ctx.lineWidth = 2; ctx.stroke();

                const rad = (satellitePos * Math.PI) / 180;
                const satX = GW_X + SKY_RADIUS * Math.cos(-rad);
                const satY = GW_Y + SKY_RADIUS * Math.sin(-rad);

                if (showComposite) {
                    sweepHistory.forEach(h => {
                        const hElev = Math.max(0, 90 - Math.abs(h.angle - 90));
                        const distFromGW = MAX_FOOTPRINT_REACH * (1 - (hElev / 90)); 
                        const side = h.angle < 90 ? 1 : -1;
                        ctx.beginPath();
                        ctx.ellipse(GW_X + (side * distFromGW), GW_Y + 15 + (hElev * 0.2), 15 + (90-hElev)/5, 5, 0, 0, Math.PI * 2);
                        ctx.fillStyle = 'rgba(239, 68, 68, 0.08)'; ctx.fill();
                    });
                }

                if (satY <= GW_Y) {
                    const beamGrad = ctx.createLinearGradient(GW_X, GW_Y, satX, satY);
                    beamGrad.addColorStop(0, 'rgba(37, 99, 235, 0.4)');
                    beamGrad.addColorStop(1, 'rgba(37, 99, 235, 0)');
                    ctx.strokeStyle = beamGrad; ctx.lineWidth = 3;
                    ctx.beginPath(); ctx.moveTo(GW_X, GW_Y); ctx.lineTo(satX, satY); ctx.stroke();

                    const currentDist = MAX_FOOTPRINT_REACH * (1 - (elevation / 90));
                    const currentSide = satellitePos < 90 ? 1 : -1;
                    const groundX = GW_X + currentSide * currentDist;
                    const scaleLobe = 15 + (90 - elevation) * 1.2;
                    const lobeGrad = ctx.createRadialGradient(groundX, GW_Y + 15, 0, groundX, GW_Y + 15, scaleLobe);
                    lobeGrad.addColorStop(0, isThresholdBreach ? 'rgba(239, 68, 68, 0.7)' : 'rgba(245, 158, 11, 0.6)');
                    lobeGrad.addColorStop(1, 'rgba(245, 158, 11, 0)');
                    ctx.beginPath(); ctx.ellipse(groundX, GW_Y + 15 + (elevation * 0.2), scaleLobe, scaleLobe / 2.5, 0, 0, Math.PI * 2);
                    ctx.fillStyle = lobeGrad; ctx.fill();

                    ctx.save();
                    ctx.translate(satX, satY); ctx.rotate(-rad);
                    ctx.fillStyle = isDragging ? '#4f46e5' : '#1e293b';
                    ctx.fillRect(-12, -4, 24, 8); ctx.fillStyle = '#3b82f6';
                    ctx.fillRect(-18, -10, 6, 20); ctx.fillRect(12, -10, 6, 20);
                    if (!isSimulating) {
                        ctx.strokeStyle = 'white'; ctx.lineWidth = 1; ctx.strokeRect(-19, -11, 38, 22);
                    }
                    ctx.restore();
                }

                ctx.save();
                ctx.translate(GW_X, GW_Y - 5); ctx.rotate(-rad + Math.PI/2);
                ctx.beginPath(); ctx.arc(0, 0, 20, Math.PI * 0.1, Math.PI * 0.9);
                ctx.strokeStyle = isCompliantMode ? '#1e293b' : '#ef4444';
                ctx.lineWidth = 4; ctx.stroke();
                ctx.restore();

            }, [satellitePos, showComposite, sweepHistory, isCompliantMode, isSimulating, isDragging, scale, isThresholdBreach]);

            const analyzeLinkWithGemini = async () => {
                setIsAnalyzing(true);
                const userPrompt = `Engineer Report: Elevation ${elevation.toFixed(1)}°, PFD ${currentPFD.toFixed(1)}dBm. Site ${isCompliantMode ? 'Rural' : 'Urban Fringe'}. Analyze GL-10 compliance at -77.6dBm threshold.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ contents: [{ parts: [{ text: userPrompt }] }] })
                    });
                    const result = await response.json();
                    setAnalysis(result.candidates?.[0]?.content?.parts?.[0]?.text);
                } catch (e) { setAnalysis("AI Service Unavailable."); } finally { setIsAnalyzing(false); }
            };

            return (
                <div 
                    className="bg-slate-50 shadow-2xl overflow-hidden rounded-2xl flex flex-col border border-slate-200"
                    style={{ 
                        width: BASE_WIDTH, 
                        height: BASE_HEIGHT, 
                        transform: `scale(${scale})`,
                        transformOrigin: 'center center'
                    }}
                >
                    {/* Header */}
                    <header className="flex justify-between items-center px-8 py-6 bg-white border-b border-slate-200">
                        <div className="flex items-center gap-5">
                            <div className="p-3 bg-indigo-600 rounded-xl shadow-lg shadow-indigo-200">
                                <Icon name="radar" size={28} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-2xl font-black text-slate-800 tracking-tight flex items-center gap-3">
                                    Q/V Coexistence Audit
                                    <span className={`text-xs px-3 py-1 rounded-full border uppercase font-bold tracking-tighter ${isCompliantMode ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200 animate-pulse'}`}>
                                        {isCompliantMode ? 'Compliant Site' : 'Non-Compliant Site'}
                                    </span>
                                </h1>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-4">
                            <div className="flex bg-slate-100 p-1.5 rounded-xl border border-slate-200 shadow-inner">
                                <button 
                                    onClick={() => setIsSimulating(!isSimulating)}
                                    className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${isSimulating ? 'bg-white text-indigo-600 shadow-sm' : 'text-slate-500 hover:bg-white/50'}`}
                                >
                                    <Icon name={isSimulating ? "pause" : "play"} size={16} />
                                    {isSimulating ? 'PAUSE' : 'MANUAL'}
                                </button>
                                <button 
                                    onClick={() => { setIsCompliantMode(!isCompliantMode); setSweepHistory([]); setSatellitePos(45); }}
                                    className={`flex items-center gap-2 px-5 py-2.5 rounded-lg text-sm font-bold transition-all ${!isCompliantMode ? 'bg-red-600 text-white shadow-md' : 'text-slate-500 hover:bg-white/50'}`}
                                >
                                    <Icon name={isCompliantMode ? "toggle-left" : "toggle-right"} size={18} />
                                    SITE CONFIG
                                </button>
                            </div>
                            <button onClick={analyzeLinkWithGemini} disabled={isAnalyzing} className="flex items-center gap-3 bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg shadow-indigo-100 transition-all active:scale-95">
                                {isAnalyzing ? <Icon name="loader-2" size={18} className="animate-spin" /> : <Icon name="sparkles" size={18} />} 
                                AI AUDIT
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 grid grid-cols-12 overflow-hidden bg-white">
                        <div className="col-span-9 relative bg-[#fcfdfe] border-r border-slate-200">
                            {/* Manual Mode Hint */}
                            {!isSimulating && (
                                <div className="absolute top-6 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-6 py-2.5 rounded-full text-xs font-black shadow-2xl flex items-center gap-3 border-2 border-white/20 animate-bounce z-10">
                                    <Icon name="mouse-pointer-2" size={14} /> GRAB SATELLITE TO MANUAL SWEEP
                                </div>
                            )}

                            {/* Canvas Container */}
                            <div className="w-full h-full flex items-center justify-center">
                                <canvas 
                                    ref={canvasRef} 
                                    width={CANVAS_WIDTH} 
                                    height={CANVAS_HEIGHT} 
                                    onMouseDown={handleMouseDown}
                                    onMouseMove={handleMouseMove}
                                    onMouseUp={() => setIsDragging(false)}
                                    onMouseLeave={() => setIsDragging(false)}
                                    className={`cursor-crosshair ${!isSimulating ? 'hover:cursor-grab active:cursor-grabbing' : ''}`}
                                />
                            </div>

                            {/* Telemetry HUD */}
                            <div className="absolute bottom-10 left-10 right-10 flex justify-between items-end">
                                <div className="bg-slate-900 text-white p-8 rounded-3xl shadow-2xl border border-slate-700 min-w-[420px]">
                                    <div className="flex justify-between items-center mb-6 border-b border-slate-700 pb-3">
                                        <div className="flex items-center gap-3">
                                            <Icon name="globe" size={18} className="text-indigo-400" />
                                            <span className="text-xs font-mono text-indigo-400 font-bold uppercase tracking-widest">PFD Real-time Monitor</span>
                                        </div>
                                        <div className={`h-2 w-2 rounded-full ${isSimulating ? 'bg-green-500 animate-pulse' : 'bg-amber-500'}`}></div>
                                    </div>
                                    <div className="grid grid-cols-3 gap-8 font-mono">
                                        <div>
                                            <div className="text-[10px] text-slate-500 uppercase font-bold mb-1">Elevation</div>
                                            <div className="text-2xl font-black">{elevation.toFixed(1)}°</div>
                                        </div>
                                        <div className="col-span-2">
                                            <div className="text-[10px] text-slate-500 uppercase flex justify-between font-bold mb-2">
                                                <span>Power Flux Density (dBm)</span>
                                                <span className="text-amber-400">Limit: {PFD_THRESHOLD}</span>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <span className={`text-2xl font-black min-w-[70px] ${isThresholdBreach ? 'text-red-400' : 'text-green-400'}`}>
                                                    {currentPFD.toFixed(1)}
                                                </span>
                                                <div className="flex-1 h-4 bg-slate-800 rounded-full overflow-hidden border border-slate-700 relative">
                                                    <div 
                                                        className="absolute top-0 bottom-0 w-1 bg-amber-400 z-10 shadow-[0_0_8px_rgba(251,191,36,0.6)]" 
                                                        style={{ left: `${getPFDPercentage(PFD_THRESHOLD)}%` }}
                                                    ></div>
                                                    <div 
                                                        className={`h-full transition-all duration-300 ${isThresholdBreach ? 'bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.6)]' : 'bg-green-500'}`}
                                                        style={{ width: `${getPFDPercentage(currentPFD)}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl shadow-2xl border border-slate-200 max-w-[220px]">
                                    <h5 className="text-[10px] font-black text-slate-400 uppercase mb-3 tracking-widest">Audit Result</h5>
                                    <div className={`text-lg font-black flex items-center gap-3 ${isThresholdBreach ? 'text-red-600' : 'text-green-600'}`}>
                                        <Icon name={isThresholdBreach ? "shield-alert" : "check-circle-2"} size={24} />
                                        {isThresholdBreach ? 'REJECTED' : 'PASSED'}
                                    </div>
                                    <p className="text-xs text-slate-500 mt-2 leading-tight font-medium">
                                        {isThresholdBreach ? "Threshold exceeded in CMA boundary." : "Coexistence parameters verified."}
                                    </p>
                                </div>
                            </div>
                        </div>

                        {/* Sidebar */}
                        <aside className="col-span-3 p-8 flex flex-col gap-8 bg-slate-50/50 custom-scrollbar overflow-y-auto">
                            <section>
                                <h3 className="text-xs font-black text-slate-800 flex items-center gap-2 mb-6 uppercase tracking-widest border-b pb-3 border-slate-200">
                                    <Icon name="settings" size={16} className="text-indigo-600" />
                                    Regulatory Parameters
                                </h3>
                                <div className="space-y-6">
                                    <div className="p-5 bg-white rounded-2xl border border-slate-200 shadow-sm">
                                        <div className="text-[10px] font-bold text-slate-400 mb-2 uppercase tracking-widest">PFD Limit (ISED)</div>
                                        <div className="text-xl font-black text-slate-800 mb-2">{PFD_THRESHOLD} <span className="text-sm font-normal text-slate-400">dBm/MHz</span></div>
                                        <p className="text-xs text-slate-500 leading-relaxed font-medium">
                                            The <span className="text-indigo-600 font-bold">-77.6 dBm</span> limit protects terrestrial 5G services within CMAs from satellite side-lobe interference.
                                        </p>
                                    </div>

                                    <div className="p-5 bg-indigo-600 text-white rounded-2xl shadow-lg shadow-indigo-100">
                                        <div className="flex items-center gap-2 font-bold text-xs mb-3">
                                            <Icon name="compass" size={14} />
                                            <span>Spatial Coexistence</span>
                                        </div>
                                        <p className="text-xs text-indigo-100 leading-relaxed">
                                            {isCompliantMode 
                                                ? "Current site uses a 250km buffer from high-density urban zones, ensuring interference remains sub-threshold at all angles."
                                                : "Current site is located on the suburban fringe. Side-lobes intersect urban zones at elevations below 45°."
                                            }
                                        </p>
                                    </div>
                                </div>
                            </section>

                            <section className="mt-auto">
                                {analysis ? (
                                    <div className="p-5 bg-white rounded-2xl border-2 border-indigo-100 shadow-xl relative overflow-hidden group">
                                        <div className="absolute top-0 right-0 p-2 opacity-10 group-hover:opacity-20 transition-opacity">
                                            <Icon name="sparkles" size={40} className="text-indigo-600" />
                                        </div>
                                        <h4 className="text-[10px] font-black text-indigo-600 mb-3 flex items-center gap-2 uppercase">
                                            <Icon name="file-text" size={12} /> AI Engineering Report
                                        </h4>
                                        <p className="text-xs text-slate-700 leading-relaxed italic font-medium">
                                            "{analysis.slice(0, 200)}..."
                                        </p>
                                        <button onClick={() => setAnalysis(null)} className="mt-4 text-[10px] font-black text-indigo-500 uppercase hover:text-indigo-700">Clear Report</button>
                                    </div>
                                ) : (
                                    <div className="bg-slate-900 p-6 rounded-3xl border border-slate-800 shadow-2xl">
                                        <h3 className="text-[10px] font-black text-slate-500 mb-4 tracking-widest uppercase">Manual Diagnostics</h3>
                                        <p className="text-[11px] text-slate-400 leading-relaxed mb-6 font-medium">
                                            To perform a manual sweep, click 'PAUSE' and drag the satellite to test boundary threshold breaches.
                                        </p>
                                        <div className="space-y-3">
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-slate-500">Threshold:</span>
                                                <span className="text-amber-400 font-mono font-bold">{PFD_THRESHOLD} dBm</span>
                                            </div>
                                            <div className="flex justify-between items-center text-xs">
                                                <span className="text-slate-500">Status:</span>
                                                <span className={isThresholdBreach ? 'text-red-400 font-bold' : 'text-green-400 font-bold'}>
                                                    {isThresholdBreach ? 'BREACHED' : 'CLEAR'}
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </section>
                        </aside>
                    </main>
                    
                    {/* Responsive Footer */}
                    <footer className="px-8 py-4 bg-slate-50 border-t border-slate-200 text-[10px] text-slate-400 font-bold flex justify-between items-center uppercase tracking-widest">
                        <span>Engine: ITU-R P.452 Propagation Standard</span>
                        <div className="flex items-center gap-4">
                            <span>SAB-002-21 Mask</span>
                            <div className="w-1 h-1 bg-slate-300 rounded-full"></div>
                            <span>GL-10 Compliant Rendering</span>
                        </div>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
